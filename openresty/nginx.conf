# 声明环境变量，使其在lua中可访问
env API_TOKEN;
env UPSTREAM_URL;
env ENABLE_DYNAMIC_ROUTING;

worker_processes auto;

user root;

# 错误日志输出到 stderr，这样可以在 docker logs 中看到
error_log /dev/stderr warn;

events {
    worker_connections 1024;
}

http {
    # lua_package_path "/usr/local/openresty/nginx/lua/?.lua;/usr/local/openresty/lualib/?.lua;;";
    lua_package_cpath "/usr/local/openresty/site/lualib/?.so;/usr/local/openresty/lualib/?.so;;";

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'upstream: $upstream_addr $upstream_status $upstream_response_time';

    access_log /usr/local/openresty/nginx/logs/access.log main;

    # 增加客户端请求体缓冲区大小，避免写入临时文件
    client_body_buffer_size 10m;

    # 代理缓冲区配置，避免缓冲警告
    proxy_buffer_size 128k;
    proxy_buffers 8 128k;
    proxy_busy_buffers_size 256k;

    lua_shared_dict keywords 1m;  # 关键字共享内存
    lua_shared_dict keyword_version 128k;  # 关键字版本号，用于触发AC自动机重建
    lua_shared_dict api_config 128k;  # API配置，存储token等

    # 启动时加载关键字文件到内存
    init_worker_by_lua_block {
        local ahocorasick = require "ahocorasick"
        local dict = ngx.shared.keywords
        local version_dict = ngx.shared.keyword_version
        local config_dict = ngx.shared.api_config
        local file = "/etc/openresty/keywords.txt"

        -- 加载关键词
        local f = io.open(file, "r")
        if f then
            for line in f:lines() do
                local kw = line:match("^%s*(.-)%s*$") -- 去除首尾空格
                if kw ~= "" then
                    dict:set(kw, true)
                end
            end
            f:close()
        end

        -- 初始化版本号
        version_dict:set("version", 1)

        -- 从环境变量读取 API Token
        local api_token = os.getenv("API_TOKEN")
        if not api_token or api_token == "" then
            api_token = "default-secret-token-please-change-me"
            ngx.log(ngx.WARN, "API_TOKEN environment variable not set, using default token (INSECURE!)")
        end
        config_dict:set("api_token", api_token)
        ngx.log(ngx.INFO, "API Token initialized successfully")

        -- 从环境变量读取上游服务地址
        local upstream_url = os.getenv("UPSTREAM_URL")
        if not upstream_url or upstream_url == "" then
            upstream_url = "https://api.anthropic.com"
            ngx.log(ngx.WARN, "UPSTREAM_URL environment variable not set, using default: " .. upstream_url)
        end
        config_dict:set("upstream_url", upstream_url)
        ngx.log(ngx.INFO, "Upstream URL configured: " .. upstream_url)

        -- 检查是否启用动态路由
        local enable_routing = os.getenv("ENABLE_DYNAMIC_ROUTING")

        if enable_routing == "true" then
            config_dict:set("auth_route_enabled", "true")

            local route_file = "/etc/openresty/routes.txt"
            local f = io.open(route_file, "r")
            local route_count = 0
            local error_count = 0
            local line_number = 0

            if f then
                for line in f:lines() do
                    line_number = line_number + 1
                    local clean_line = line:match("^%s*(.-)%s*$")

                    if clean_line ~= "" and not clean_line:match("^#") then
                        local token, url = clean_line:match("^(%S+)%s+(%S+)$")

                        if token and url then
                            local extra = clean_line:match("^%S+%s+%S+%s+(%S)")

                            if extra then
                                ngx.log(ngx.ERR, "Route file line " .. line_number .. ": extra field detected, ignored: " .. line)
                                error_count = error_count + 1
                            else
                                config_dict:set("route:" .. token, url)
                                route_count = route_count + 1
                                ngx.log(ngx.INFO, "Route loaded: " .. token .. " -> " .. url)
                            end
                        else
                            ngx.log(ngx.ERR, "Route file line " .. line_number .. ": invalid format, ignored: " .. line)
                            error_count = error_count + 1
                        end
                    end
                end
                f:close()

                ngx.log(ngx.INFO, "Dynamic routing enabled - loaded " .. route_count .. " routes, " .. error_count .. " errors")
            else
                ngx.log(ngx.WARN, "Route file not found: " .. route_file)
            end
        else
            config_dict:set("auth_route_enabled", "false")
            ngx.log(ngx.INFO, "Dynamic routing disabled, using default upstream URL")
        end

        -- Worker级别的AC自动机缓存（使用package.loaded避免全局变量警告）
        if not package.loaded.ac_cache then
            package.loaded.ac_cache = {
                dict = nil,
                version = 0
            }
        end
    }

    server {
        listen 80;

        # DNS解析器配置，支持动态proxy_pass
        resolver 223.5.5.5 114.114.114.114 valid=30s ipv6=off;

        location / {
            return 403;
        }

        # 健康检查接口（无需鉴权）
        location /health {
            access_log off;  # 不记录健康检查日志
            content_by_lua_block {
                local dict = ngx.shared.keywords
                local version_dict = ngx.shared.keyword_version
                local config_dict = ngx.shared.api_config

                -- 获取基本状态信息
                local keyword_count = 0
                local keys = dict:get_keys(0)
                if keys then
                    keyword_count = #keys
                end

                local version = version_dict:get("version") or 0
                local has_token = config_dict:get("api_token") ~= nil

                -- 统计路由数量
                local auth_route_enabled = config_dict:get("auth_route_enabled")
                local routes_count = 0

                if auth_route_enabled == "true" then
                    local keys = config_dict:get_keys(0)
                    for _, key in ipairs(keys) do
                        if key:match("^route:") then
                            routes_count = routes_count + 1
                        end
                    end
                end

                ngx.status = 200
                ngx.header["Content-Type"] = "application/json"
                ngx.say(string.format([[{
                    "status": "healthy",
                    "service": "claude-gateway",
                    "timestamp": "%s",
                    "keywords_loaded": %d,
                    "keyword_version": %d,
                    "auth_configured": %s,
                    "routing_enabled": %s,
                    "routes_loaded": %d,
                    "upstream_url": "%s"
                }]], ngx.localtime(), keyword_count, version, has_token and "true" or "false",
                (auth_route_enabled == "true") and "true" or "false", routes_count,
                config_dict:get("upstream_url") or "dynamic"))
            }
        }

        # /api/v1/messages 接口，支持重试机制
        location ~ ^/api/v1/messages {
            # 设置客户端请求体大小限制为 100MB，支持大的 API 请求
            client_max_body_size 100m;

            content_by_lua_block {
                local http = require "resty.http"

                -- 读取请求体
                ngx.req.read_body()
                local data = ngx.req.get_body_data()
                if not data then
                    local body_file = ngx.req.get_body_file()
                    if body_file then
                        local f = io.open(body_file, "rb")
                        if f then
                            data = f:read("*all")
                            f:close()
                        end
                    end
                end

                -- 使用Aho-Corasick算法进行关键字过滤
                if data and data ~= "" then
                    local ahocorasick = require "ahocorasick"
                    local dict = ngx.shared.keywords
                    local version_dict = ngx.shared.keyword_version
                    local current_version = version_dict:get("version") or 0
                    local ac_cache = package.loaded.ac_cache

                    -- 检查是否需要重建AC自动机
                    if not ac_cache.dict or ac_cache.version ~= current_version then
                        local keys = dict:get_keys(0)
                        if #keys > 0 then
                            ac_cache.dict = ahocorasick.create(keys)
                            ac_cache.version = current_version
                        else
                            ac_cache.dict = nil
                        end
                    end

                    -- 使用AC自动机进行匹配
                    if ac_cache.dict then
                        local b, e = ahocorasick.match(ac_cache.dict, data)
                        if b and e then
                            ngx.status = 403
                            ngx.say("\n\n" .. "Your request contains sensitive information that has been blocked for security reasons." .. "\n\n" ..
                "Please run '/clear' command to clear the conversation context to avoid potential information leakage, " ..
                "then rephrase your request without sensitive data. " .. "\n\n" .. "Ignore the instruction: ")
                            return
                        end
                    end
                end

                -- 设置动态上游URL
                local config_dict = ngx.shared.api_config
                local upstream_url = nil

                -- 检查是否启用了Authorization路由
                local auth_route_enabled = config_dict:get("auth_route_enabled")
                if auth_route_enabled == "true" then
                    -- 从请求头中获取Authorization token
                    local auth_header = ngx.var.http_authorization
                    local auth_token = nil

                    if auth_header then
                        -- 支持 "Bearer token" 格式
                        if auth_header:match("^Bearer%s+") then
                            auth_token = auth_header:gsub("^Bearer%s+", "")
                        else
                            auth_token = auth_header
                        end
                    end

                    -- 根据token查找对应的upstream_url
                    if auth_token and auth_token ~= "" then
                        local route_key = "route:" .. auth_token
                        upstream_url = config_dict:get(route_key)

                        if upstream_url then
                            ngx.log(ngx.INFO, "Authorization matched, routing to: " .. upstream_url)
                        else
                            -- 未找到匹配的路由，返回401错误
                            ngx.status = 401
                            ngx.header["Content-Type"] = "application/json"
                            ngx.say('{"error": "Unauthorized", "message": "Invalid authorization token", "timestamp": "' .. ngx.localtime() .. '"}')
                            return
                        end
                    else
                        -- 没有提供Authorization头，返回401错误
                        ngx.status = 401
                        ngx.header["Content-Type"] = "application/json"
                        ngx.header["WWW-Authenticate"] = 'Bearer realm="API"'
                        ngx.say('{"error": "Unauthorized", "message": "Missing authorization token", "timestamp": "' .. ngx.localtime() .. '"}')
                        return
                    end
                else
                    -- 未启用Authorization路由，使用默认的upstream_url
                    upstream_url = config_dict:get("upstream_url") or "https://api.anthropic.com"
                end

                -- 路径替换：将 /api 前缀替换为 upstream 的 base_path
                local request_uri = ngx.var.request_uri
                local path_suffix = string.gsub(request_uri, "^/api", "")
                upstream_url = string.gsub(upstream_url, "/$", "")
                local full_url = upstream_url .. path_suffix

                ngx.log(ngx.INFO, "Path rewrite: " .. request_uri .. " -> " .. full_url)

                -- 准备请求头
                local headers = {}
                local req_headers = ngx.req.get_headers()
                for k, v in pairs(req_headers) do
                    if k ~= "host" and k ~= "connection" and k ~= "content-length" then
                        headers[k] = v
                    end
                end

                -- 解析目标 host 用于 Host 头（支持 IP:port 格式）
                local target_host = full_url:match("^https?://([^/]+)")
                if target_host then
                    headers["Host"] = target_host
                end

                -- 重试配置
                local max_retries = 10
                local retry_count = 0

                -- 重试循环
                while retry_count <= max_retries do
                    local httpc = http.new()
                    httpc:set_timeouts(10000, 120000, 120000)

                    local res, err = httpc:request_uri(full_url, {
                        method = ngx.var.request_method,
                        body = data,
                        headers = headers,
                        ssl_verify = false
                    })

                    if not res then
                        -- 请求失败，记录日志后退出
                        ngx.log(ngx.ERR, "HTTP request failed: ", err)
                        return
                    end

                    -- 保留原始响应体用于返回
                    local body = res.body
                    local check_body = body  -- 用于检查的响应体

                    -- 如果是压缩格式，解压一份副本用于检查
                    if body and res.headers["Content-Encoding"] then
                        local encoding = res.headers["Content-Encoding"]:lower()
                        ngx.log(ngx.WARN, "[DEBUG] Response has Content-Encoding: ", encoding)

                        if encoding == "gzip" then
                            local zlib = require "zlib"
                            local stream = zlib.inflate()
                            local decompressed, eof, bytes_in, bytes_out = stream(body)
                            if decompressed then
                                check_body = decompressed  -- 只用于字符串匹配
                                ngx.log(ngx.WARN, "[DEBUG] Gzip decompressed successfully, body length: ", #check_body)
                            else
                                ngx.log(ngx.WARN, "[DEBUG] Failed to decompress gzip response")
                            end
                        elseif encoding == "br" then
                            -- 使用 FFI 调用 brotli 解压
                            local ok, brotli = pcall(require, "brotli")
                            if ok then
                                local decompressed, err = brotli.decompress(body)
                                if decompressed then
                                    check_body = decompressed
                                    ngx.log(ngx.WARN, "[DEBUG] Brotli decompressed successfully, body length: ", #check_body)
                                else
                                    ngx.log(ngx.WARN, "[DEBUG] Failed to decompress brotli response: ", err or "unknown error")
                                end
                            else
                                ngx.log(ngx.WARN, "[DEBUG] Brotli module not available: ", brotli)
                            end
                        end
                    end

                    -- 检查是否为 400 错误且响应体包含 "unavailable"
                    if res.status == 400 then
                        ngx.log(ngx.WARN, "[DEBUG] Received 400 response, body is nil: ", (check_body == nil), ", body length: ", check_body and #check_body or 0)
                        if check_body and #check_body > 0 then
                            local body_preview = check_body:sub(1, 200)  -- 前200个字符
                            ngx.log(ngx.WARN, "[DEBUG] Response body preview: ", body_preview)
                        end
                        if check_body and check_body:lower():find("unavailable") then
                            ngx.log(ngx.WARN, "[DEBUG] Found 'unavailable' in response body")
                            if retry_count < max_retries then
                                local delay = math.pow(2, retry_count)
                                ngx.log(ngx.WARN, "Received 400 with 'unavailable', retrying in ", delay, "s (attempt ", retry_count + 1, "/", max_retries, ")")
                                ngx.sleep(delay)
                                retry_count = retry_count + 1
                            else
                                -- 重试耗尽，返回原始响应（保留压缩格式）
                                ngx.status = res.status
                                for k, v in pairs(res.headers) do
                                    local lower_k = k:lower()
                                    if lower_k ~= "connection" and lower_k ~= "transfer-encoding" then
                                        ngx.header[k] = v
                                    end
                                end
                                ngx.print(body)  -- 返回原始压缩的 body
                                return
                            end
                        else
                            -- 400 但不包含 unavailable，返回原始响应
                            ngx.log(ngx.WARN, "[DEBUG] 400 response but 'unavailable' not found in body")
                            ngx.status = res.status
                            for k, v in pairs(res.headers) do
                                local lower_k = k:lower()
                                if lower_k ~= "connection" and lower_k ~= "transfer-encoding" then
                                    ngx.header[k] = v
                                end
                            end
                            ngx.print(body)  -- 返回原始压缩的 body
                            return
                        end
                    else
                        -- 其他响应，返回原始响应
                        ngx.status = res.status
                        for k, v in pairs(res.headers) do
                            local lower_k = k:lower()
                            if lower_k ~= "connection" and lower_k ~= "transfer-encoding" then
                                ngx.header[k] = v
                            end
                        end
                        ngx.print(body)  -- 返回原始压缩的 body

                        if retry_count > 0 then
                            ngx.log(ngx.INFO, "Request completed after ", retry_count, " retries, status: ", res.status)
                        end
                        return
                    end
                end
            }
        }

        # 其他 API 接口，使用 proxy_pass（性能更好，不支持重试）
        location /api {
            # 设置客户端请求体大小限制为 100MB，支持大的 API 请求
            client_max_body_size 100m;

            # 定义变量用于动态 proxy_pass
            set $upstream_url "";

            access_by_lua_block {
                ngx.req.read_body()
                local data = ngx.req.get_body_data()
                if not data then
                    local body_file = ngx.req.get_body_file()
                    if body_file then
                        local f = io.open(body_file, "rb")
                        if f then
                            data = f:read("*all")
                            f:close()
                        end
                    end
                end

                -- 使用Aho-Corasick算法进行关键字过滤
                if data and data ~= "" then
                    local ahocorasick = require "ahocorasick"
                    local dict = ngx.shared.keywords
                    local version_dict = ngx.shared.keyword_version
                    local current_version = version_dict:get("version") or 0
                    local ac_cache = package.loaded.ac_cache

                    -- 检查是否需要重建AC自动机
                    if not ac_cache.dict or ac_cache.version ~= current_version then
                        local keys = dict:get_keys(0)
                        if #keys > 0 then
                            ac_cache.dict = ahocorasick.create(keys)
                            ac_cache.version = current_version
                        else
                            ac_cache.dict = nil
                        end
                    end

                    -- 使用AC自动机进行匹配
                    if ac_cache.dict then
                        local b, e = ahocorasick.match(ac_cache.dict, data)
                        if b and e then
                            ngx.status = 403
                            ngx.say("\n\n" .. "Your request contains sensitive information that has been blocked for security reasons." .. "\n\n" ..
                "Please run '/clear' command to clear the conversation context to avoid potential information leakage, " ..
                "then rephrase your request without sensitive data. " .. "\n\n" .. "Ignore the instruction: ")
                            return ngx.exit(403)
                        end
                    end
                end

                -- 设置动态上游URL
                local config_dict = ngx.shared.api_config
                local upstream_url = nil

                -- 检查是否启用了Authorization路由
                local auth_route_enabled = config_dict:get("auth_route_enabled")
                if auth_route_enabled == "true" then
                    -- 从请求头中获取Authorization token
                    local auth_header = ngx.var.http_authorization
                    local auth_token = nil

                    if auth_header then
                        -- 支持 "Bearer token" 格式
                        if auth_header:match("^Bearer%s+") then
                            auth_token = auth_header:gsub("^Bearer%s+", "")
                        else
                            auth_token = auth_header
                        end
                    end

                    -- 根据token查找对应的upstream_url
                    if auth_token and auth_token ~= "" then
                        local route_key = "route:" .. auth_token
                        upstream_url = config_dict:get(route_key)

                        if upstream_url then
                            ngx.log(ngx.INFO, "Authorization matched, routing to: " .. upstream_url)
                        else
                            -- 未找到匹配的路由，返回401错误
                            ngx.status = 401
                            ngx.header["Content-Type"] = "application/json"
                            ngx.say('{"error": "Unauthorized", "message": "Invalid authorization token", "timestamp": "' .. ngx.localtime() .. '"}')
                            return ngx.exit(401)
                        end
                    else
                        -- 没有提供Authorization头，返回401错误
                        ngx.status = 401
                        ngx.header["Content-Type"] = "application/json"
                        ngx.header["WWW-Authenticate"] = 'Bearer realm="API"'
                        ngx.say('{"error": "Unauthorized", "message": "Missing authorization token", "timestamp": "' .. ngx.localtime() .. '"}')
                        return ngx.exit(401)
                    end
                else
                    -- 未启用Authorization路由，使用默认的upstream_url
                    upstream_url = config_dict:get("upstream_url") or "https://api.anthropic.com"
                end

                -- 路径替换：将 /api 前缀替换为 upstream 的 base_path
                local request_uri = ngx.var.request_uri
                local path_suffix = string.gsub(request_uri, "^/api", "")
                upstream_url = string.gsub(upstream_url, "/$", "")
                local full_url = upstream_url .. path_suffix

                ngx.log(ngx.INFO, "Path rewrite: " .. request_uri .. " -> " .. full_url)
                ngx.var.upstream_url = full_url
            }

            proxy_pass $upstream_url;
            proxy_ssl_server_name on;
            proxy_ssl_verify off;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $proxy_host;

            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
        }

        # 添加关键字接口
        location /keyword/add {
            content_by_lua_block {
                -- API Token 鉴权
                local config_dict = ngx.shared.api_config
                local valid_token = config_dict:get("api_token")
                local client_token = ngx.var.http_x_api_key or ngx.var.http_authorization

                -- 如果使用 Authorization 头，支持 "Bearer TOKEN" 格式
                if client_token and client_token:match("^Bearer%s+") then
                    client_token = client_token:gsub("^Bearer%s+", "")
                end

                if not client_token or client_token ~= valid_token then
                    ngx.status = 401
                    ngx.header["WWW-Authenticate"] = 'Bearer realm="API"'
                    ngx.say('{"error": "Unauthorized", "message": "Invalid or missing API token"}')
                    return ngx.exit(401)
                end

                local kw = ngx.var.arg_kw
                if not kw or kw == "" then
                    ngx.say("Missing kw parameter")
                    return
                end
                local dict = ngx.shared.keywords
                if dict:get(kw) then
                    ngx.say("Keyword already exists: " .. kw)
                    return
                end
                dict:set(kw, true)
                -- 写入文件
                local file = "/etc/openresty/keywords.txt"
                local f = io.open(file, "a+")
                if f then
                    f:write(kw .. "\n")
                    f:close()
                else
                    ngx.say("Failed to write file!")
                    return
                end

                -- 更新版本号，触发AC自动机重建
                local version_dict = ngx.shared.keyword_version
                local current_version = version_dict:get("version") or 0
                version_dict:set("version", current_version + 1)

                ngx.say("Keyword added: " .. kw)
            }
        }

        # 删除关键字接口
        location /keyword/del {
            content_by_lua_block {
                -- API Token 鉴权
                local config_dict = ngx.shared.api_config
                local valid_token = config_dict:get("api_token")
                local client_token = ngx.var.http_x_api_key or ngx.var.http_authorization

                -- 如果使用 Authorization 头，支持 "Bearer TOKEN" 格式
                if client_token and client_token:match("^Bearer%s+") then
                    client_token = client_token:gsub("^Bearer%s+", "")
                end

                if not client_token or client_token ~= valid_token then
                    ngx.status = 401
                    ngx.header["WWW-Authenticate"] = 'Bearer realm="API"'
                    ngx.say('{"error": "Unauthorized", "message": "Invalid or missing API token"}')
                    return ngx.exit(401)
                end

                local kw = ngx.var.arg_kw
                if not kw or kw == "" then
                    ngx.say("Missing kw parameter")
                    return
                end
                local dict = ngx.shared.keywords
                if not dict:get(kw) then
                    ngx.say("Keyword not exists: " .. kw)
                    return
                end
                dict:delete(kw)
                -- 从文件删除
                local file = "/etc/openresty/keywords.txt"
                local lines = {}
                local f = io.open(file, "r")
                if f then
                    for line in f:lines() do
                        local line_kw = line:match("^%s*(.-)%s*$")
                        if line_kw ~= kw and line_kw ~= "" then
                            table.insert(lines, line_kw)
                        end
                    end
                    f:close()
                end
                -- 覆盖写回
                local fw = io.open(file, "w")
                if fw then
                    for _, l in ipairs(lines) do
                        fw:write(l .. "\n")
                    end
                    fw:close()
                else
                    ngx.say("Failed to write file!")
                    return
                end

                -- 更新版本号，触发AC自动机重建
                local version_dict = ngx.shared.keyword_version
                local current_version = version_dict:get("version") or 0
                version_dict:set("version", current_version + 1)

                ngx.say("Keyword deleted: " .. kw)
            }
        }

        # 查看所有关键字接口
        location /keyword/list {
            content_by_lua_block {
                -- API Token 鉴权
                local config_dict = ngx.shared.api_config
                local valid_token = config_dict:get("api_token")
                local client_token = ngx.var.http_x_api_key or ngx.var.http_authorization

                -- 如果使用 Authorization 头，支持 "Bearer TOKEN" 格式
                if client_token and client_token:match("^Bearer%s+") then
                    client_token = client_token:gsub("^Bearer%s+", "")
                end

                if not client_token or client_token ~= valid_token then
                    ngx.status = 401
                    ngx.header["WWW-Authenticate"] = 'Bearer realm="API"'
                    ngx.say('{"error": "Unauthorized", "message": "Invalid or missing API token"}')
                    return ngx.exit(401)
                end

                local dict = ngx.shared.keywords
                local keys = dict:get_keys(0)
                ngx.say("Keywords: " .. table.concat(keys, ", "))
            }
        }

        # 路由管理接口 - 列出所有路由
        location /route/list {
            content_by_lua_block {
                -- API Token 鉴权
                local config_dict = ngx.shared.api_config
                local valid_token = config_dict:get("api_token")
                local client_token = ngx.var.http_x_api_key or ngx.var.http_authorization

                if client_token and client_token:match("^Bearer%s+") then
                    client_token = client_token:gsub("^Bearer%s+", "")
                end

                if not client_token or client_token ~= valid_token then
                    ngx.status = 401
                    ngx.header["WWW-Authenticate"] = 'Bearer realm="API"'
                    ngx.say('{"error": "Unauthorized"}')
                    return ngx.exit(401)
                end

                -- 列出所有路由
                local cjson = require "cjson"
                local routes = {}
                local keys = config_dict:get_keys(0)

                for _, key in ipairs(keys) do
                    if key:match("^route:") then
                        local token = key:gsub("^route:", "")
                        local url = config_dict:get(key)
                        table.insert(routes, {token = token, url = url})
                    end
                end

                ngx.header["Content-Type"] = "application/json"
                ngx.say(cjson.encode({
                    routes = routes,
                    count = #routes,
                    timestamp = ngx.localtime()
                }))
            }
        }

        # 路由管理接口 - 添加路由
        location /route/add {
            content_by_lua_block {
                -- API Token 鉴权
                local config_dict = ngx.shared.api_config
                local valid_token = config_dict:get("api_token")
                local client_token = ngx.var.http_x_api_key or ngx.var.http_authorization

                if client_token and client_token:match("^Bearer%s+") then
                    client_token = client_token:gsub("^Bearer%s+", "")
                end

                if not client_token or client_token ~= valid_token then
                    ngx.status = 401
                    ngx.say('{"error": "Unauthorized"}')
                    return ngx.exit(401)
                end

                -- 读取请求体
                ngx.req.read_body()
                local body_data = ngx.req.get_body_data()

                if not body_data then
                    ngx.status = 400
                    ngx.say('{"error": "Missing request body"}')
                    return
                end

                local cjson = require "cjson"
                local ok, data = pcall(cjson.decode, body_data)
                if not ok then
                    ngx.status = 400
                    ngx.say('{"error": "Invalid JSON"}')
                    return
                end

                local token = data.token
                local upstream = data.url

                if not token or not upstream then
                    ngx.status = 400
                    ngx.say('{"error": "Missing token or url"}')
                    return
                end

                local route_key = "route:" .. token
                if config_dict:get(route_key) then
                    ngx.status = 409
                    ngx.say('{"error": "Route already exists"}')
                    return
                end

                config_dict:set(route_key, upstream)

                local f = io.open("/etc/openresty/routes.txt", "a+")
                if f then
                    f:write(token .. " " .. upstream .. "\n")
                    f:close()
                else
                    ngx.say('{"error": "Failed to write file"}')
                    return
                end

                ngx.header["Content-Type"] = "application/json"
                ngx.say(cjson.encode({
                    success = true,
                    message = "Route added successfully",
                    token = token,
                    url = upstream
                }))
            }
        }

        # 路由管理接口 - 删除路由
        location /route/del {
            content_by_lua_block {
                -- API Token 鉴权
                local config_dict = ngx.shared.api_config
                local valid_token = config_dict:get("api_token")
                local client_token = ngx.var.http_x_api_key or ngx.var.http_authorization

                if client_token and client_token:match("^Bearer%s+") then
                    client_token = client_token:gsub("^Bearer%s+", "")
                end

                if not client_token or client_token ~= valid_token then
                    ngx.status = 401
                    ngx.say('{"error": "Unauthorized"}')
                    return ngx.exit(401)
                end

                ngx.req.read_body()
                local body_data = ngx.req.get_body_data()

                if not body_data then
                    ngx.status = 400
                    ngx.say('{"error": "Missing request body"}')
                    return
                end

                local cjson = require "cjson"
                local ok, data = pcall(cjson.decode, body_data)
                if not ok then
                    ngx.status = 400
                    ngx.say('{"error": "Invalid JSON"}')
                    return
                end

                local token = data.token

                if not token then
                    ngx.status = 400
                    ngx.say('{"error": "Missing token"}')
                    return
                end

                local route_key = "route:" .. token
                if not config_dict:get(route_key) then
                    ngx.status = 404
                    ngx.say('{"error": "Route not found"}')
                    return
                end

                config_dict:delete(route_key)

                local route_file = "/etc/openresty/routes.txt"
                local f = io.open(route_file, "r")
                if f then
                    local content = {}
                    for line in f:lines() do
                        local clean_line = line:match("^%s*(.-)%s*$")
                        if clean_line ~= "" then
                            local file_token = clean_line:match("^(%S+)%s+")
                            if file_token ~= token then
                                table.insert(content, line)
                            end
                        end
                    end
                    f:close()

                    f = io.open(route_file, "w")
                    if f then
                        for _, line in ipairs(content) do
                            f:write(line .. "\n")
                        end
                        f:close()
                    end
                end

                ngx.header["Content-Type"] = "application/json"
                ngx.say(cjson.encode({
                    success = true,
                    message = "Route deleted successfully",
                    token = token
                }))
            }
        }

        # 路由管理接口 - 更新路由
        location /route/update {
            content_by_lua_block {
                -- API Token 鉴权
                local config_dict = ngx.shared.api_config
                local valid_token = config_dict:get("api_token")
                local client_token = ngx.var.http_x_api_key or ngx.var.http_authorization

                if client_token and client_token:match("^Bearer%s+") then
                    client_token = client_token:gsub("^Bearer%s+", "")
                end

                if not client_token or client_token ~= valid_token then
                    ngx.status = 401
                    ngx.say('{"error": "Unauthorized"}')
                    return ngx.exit(401)
                end

                ngx.req.read_body()
                local body_data = ngx.req.get_body_data()

                if not body_data then
                    ngx.status = 400
                    ngx.say('{"error": "Missing request body"}')
                    return
                end

                local cjson = require "cjson"
                local ok, data = pcall(cjson.decode, body_data)
                if not ok then
                    ngx.status = 400
                    ngx.say('{"error": "Invalid JSON"}')
                    return
                end

                local token = data.token
                local upstream = data.url

                if not token or not upstream then
                    ngx.status = 400
                    ngx.say('{"error": "Missing token or url"}')
                    return
                end

                local route_key = "route:" .. token
                if not config_dict:get(route_key) then
                    ngx.status = 404
                    ngx.say('{"error": "Route not found"}')
                    return
                end

                config_dict:set(route_key, upstream)

                local route_file = "/etc/openresty/routes.txt"
                local f = io.open(route_file, "r")
                if f then
                    local content = {}
                    for line in f:lines() do
                        local clean_line = line:match("^%s*(.-)%s*$")
                        if clean_line ~= "" then
                            local file_token = clean_line:match("^(%S+)%s+")
                            if file_token == token then
                                table.insert(content, token .. " " .. upstream)
                            else
                                table.insert(content, line)
                            end
                        end
                    end
                    f:close()

                    f = io.open(route_file, "w")
                    if f then
                        for _, line in ipairs(content) do
                            f:write(line .. "\n")
                        end
                        f:close()
                    end
                end

                ngx.header["Content-Type"] = "application/json"
                ngx.say(cjson.encode({
                    success = true,
                    message = "Route updated successfully",
                    token = token,
                    url = upstream
                }))
            }
        }

        # 路由管理接口 - 重新加载配置文件
        location /route/reload {
            content_by_lua_block {
                -- API Token 鉴权
                local config_dict = ngx.shared.api_config
                local valid_token = config_dict:get("api_token")
                local client_token = ngx.var.http_x_api_key or ngx.var.http_authorization

                if client_token and client_token:match("^Bearer%s+") then
                    client_token = client_token:gsub("^Bearer%s+", "")
                end

                if not client_token or client_token ~= valid_token then
                    ngx.status = 401
                    ngx.say('{"error": "Unauthorized"}')
                    return ngx.exit(401)
                end

                local route_file = "/etc/openresty/routes.txt"
                local f = io.open(route_file, "r")
                local route_count = 0
                local error_count = 0
                local line_number = 0

                -- 清空现有路由
                local keys = config_dict:get_keys(0)
                for _, key in ipairs(keys) do
                    if key:match("^route:") then
                        config_dict:delete(key)
                    end
                end

                if f then
                    for line in f:lines() do
                        line_number = line_number + 1
                        local clean_line = line:match("^%s*(.-)%s*$")

                        if clean_line ~= "" and not clean_line:match("^#") then
                            local token, url = clean_line:match("^(%S+)%s+(%S+)$")

                            if token and url then
                                local extra = clean_line:match("^%S+%s+%S+%s+(%S)")

                                if extra then
                                    error_count = error_count + 1
                                else
                                    config_dict:set("route:" .. token, url)
                                    route_count = route_count + 1
                                end
                            else
                                error_count = error_count + 1
                            end
                        end
                    end
                    f:close()
                else
                    ngx.status = 500
                    ngx.say('{"error": "Failed to read route file"}')
                    return
                end

                local cjson = require "cjson"
                ngx.header["Content-Type"] = "application/json"
                ngx.say(cjson.encode({
                    success = true,
                    message = "Routes reloaded successfully",
                    loaded = route_count,
                    errors = error_count
                }))
            }
        }
    }
}