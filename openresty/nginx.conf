# 声明环境变量，使其在lua中可访问
env API_TOKEN;
env UPSTREAM_URL;
env ENABLE_DYNAMIC_ROUTING;

worker_processes auto;

user root;

# 错误日志输出到 stderr，这样可以在 docker logs 中看到
error_log /dev/stderr warn;

events {
    worker_connections 1024;
}

http {
    lua_package_path "/usr/local/openresty/nginx/lua/?.lua;/usr/local/openresty/lualib/?.lua;;";
    lua_package_cpath "/usr/local/openresty/site/lualib/?.so;/usr/local/openresty/lualib/?.so;;";

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'upstream: $upstream_addr $upstream_status $upstream_response_time';

    access_log /usr/local/openresty/nginx/logs/access.log main;

    # 增加客户端请求体缓冲区大小，避免写入临时文件
    client_body_buffer_size 10m;

    # 代理缓冲区配置，避免缓冲警告
    proxy_buffer_size 128k;
    proxy_buffers 8 128k;
    proxy_busy_buffers_size 256k;

    lua_shared_dict keywords 1m;  # 关键字共享内存
    lua_shared_dict keyword_version 128k;  # 关键字版本号，用于触发AC自动机重建
    lua_shared_dict api_config 128k;  # API配置，存储token等

    # 启动时加载关键字文件到内存
    init_worker_by_lua_block {
        local ahocorasick = require "ahocorasick"
        local dict = ngx.shared.keywords
        local version_dict = ngx.shared.keyword_version
        local config_dict = ngx.shared.api_config
        local file = "/etc/openresty/keywords.txt"

        -- 加载关键词
        local f = io.open(file, "r")
        if f then
            for line in f:lines() do
                local kw = line:match("^%s*(.-)%s*$")
                if kw ~= "" then
                    dict:set(kw, true)
                end
            end
            f:close()
        end

        -- 初始化版本号
        version_dict:set("version", 1)

        -- 从环境变量读取 API Token
        local api_token = os.getenv("API_TOKEN")
        if not api_token or api_token == "" then
            api_token = "default-secret-token-please-change-me"
            ngx.log(ngx.WARN, "API_TOKEN environment variable not set, using default token (INSECURE!)")
        end
        config_dict:set("api_token", api_token)
        ngx.log(ngx.INFO, "API Token initialized successfully")

        -- 从环境变量读取上游服务地址
        local upstream_url = os.getenv("UPSTREAM_URL")
        if not upstream_url or upstream_url == "" then
            upstream_url = "https://api.anthropic.com"
            ngx.log(ngx.WARN, "UPSTREAM_URL environment variable not set, using default: " .. upstream_url)
        end
        config_dict:set("upstream_url", upstream_url)
        ngx.log(ngx.INFO, "Upstream URL configured: " .. upstream_url)

        -- 检查是否启用动态路由
        local enable_routing = os.getenv("ENABLE_DYNAMIC_ROUTING")

        if enable_routing == "true" then
            config_dict:set("auth_route_enabled", "true")

            local route_file = "/etc/openresty/routes.txt"
            local f = io.open(route_file, "r")
            local route_count = 0
            local error_count = 0
            local line_number = 0

            if f then
                for line in f:lines() do
                    line_number = line_number + 1
                    local clean_line = line:match("^%s*(.-)%s*$")

                    if clean_line ~= "" and not clean_line:match("^#") then
                        local token, url = clean_line:match("^(%S+)%s+(%S+)$")

                        if token and url then
                            local extra = clean_line:match("^%S+%s+%S+%s+(%S)")

                            if extra then
                                ngx.log(ngx.ERR, "Route file line " .. line_number .. ": extra field detected, ignored: " .. line)
                                error_count = error_count + 1
                            else
                                config_dict:set("route:" .. token, url)
                                route_count = route_count + 1
                                ngx.log(ngx.INFO, "Route loaded: " .. token .. " -> " .. url)
                            end
                        else
                            ngx.log(ngx.ERR, "Route file line " .. line_number .. ": invalid format, ignored: " .. line)
                            error_count = error_count + 1
                        end
                    end
                end
                f:close()

                ngx.log(ngx.INFO, "Dynamic routing enabled - loaded " .. route_count .. " routes, " .. error_count .. " errors")
            else
                ngx.log(ngx.WARN, "Route file not found: " .. route_file)
            end
        else
            config_dict:set("auth_route_enabled", "false")
            ngx.log(ngx.INFO, "Dynamic routing disabled, using default upstream URL")
        end

        -- 全局变量存储AC自动机和版本号（每个worker进程独立）
        _G.ac_dict = nil
        _G.ac_version = 0
    }

    server {
        listen 80;

        # DNS解析器配置，支持动态proxy_pass
        resolver 223.5.5.5 114.114.114.114 valid=30s ipv6=off;

        location / {
            return 403;
        }

        # ==================== 健康检查接口 ====================
        location /health {
            access_log off;
            content_by_lua_block {
                local health_check = require "admin.health_check"
                health_check.check()
            }
        }

        # ==================== API 接口 ====================

        # /api/v1/messages 接口，支持重试机制
        location ~ ^/api/v1/messages {
            client_max_body_size 100m;
            content_by_lua_block {
                local retry_handler = require "handler.retry_handler"
                retry_handler.handle_with_retry("/api")
            }
        }

        # /apikey/v1/messages 接口，支持 API_KEY 认证和流式响应
        location ~ ^/apikey/v1/messages {
            client_max_body_size 100m;
            content_by_lua_block {
                local api_handler = require "handler.api_handler"
                api_handler.handle_api_key_request("/apikey")
            }
        }

        # 其他 API 接口，使用 proxy_pass（性能更好，不支持重试）
        location /api {
            client_max_body_size 100m;
            set $upstream_url "";

            access_by_lua_block {
                local body_reader = require "utils.body_reader"
                local keyword_filter = require "filter.keyword_filter"
                local dynamic_router = require "router.dynamic_router"

                local body = body_reader.read_body()

                if not keyword_filter.check(body) then
                    keyword_filter.send_blocked_response()
                    return ngx.exit(403)
                end

                local full_url = dynamic_router.route_by_auth_token("/api")
                if not full_url then
                    return ngx.exit(401)
                end

                ngx.var.upstream_url = full_url
            }

            proxy_pass $upstream_url;
            proxy_ssl_server_name on;
            proxy_ssl_verify off;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $proxy_host;

            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
        }

        # ==================== 关键词管理接口 ====================

        location /keyword/add {
            content_by_lua_block {
                local keyword_manager = require "admin.keyword_manager"
                keyword_manager.add()
            }
        }

        location /keyword/del {
            content_by_lua_block {
                local keyword_manager = require "admin.keyword_manager"
                keyword_manager.delete()
            }
        }

        location /keyword/list {
            content_by_lua_block {
                local keyword_manager = require "admin.keyword_manager"
                keyword_manager.list()
            }
        }

        # ==================== 路由管理接口 ====================

        location /route/list {
            content_by_lua_block {
                local route_manager = require "admin.route_manager"
                route_manager.list()
            }
        }

        location /route/add {
            content_by_lua_block {
                local route_manager = require "admin.route_manager"
                route_manager.add()
            }
        }

        location /route/del {
            content_by_lua_block {
                local route_manager = require "admin.route_manager"
                route_manager.delete()
            }
        }

        location /route/update {
            content_by_lua_block {
                local route_manager = require "admin.route_manager"
                route_manager.update()
            }
        }

        location /route/reload {
            content_by_lua_block {
                local route_manager = require "admin.route_manager"
                route_manager.reload()
            }
        }
    }
}
