server {
    listen 80;

    # DNS解析器配置，支持动态proxy_pass
    resolver 127.0.0.11 223.5.5.5 114.114.114.114 valid=30s ipv6=off;

    location / {
        return 403;
    }

    # ==================== 健康检查接口 ====================
    location /health {
        access_log off;
        content_by_lua_block {
            local health_check = require "admin.health_check"
            health_check.check()
        }
    }

    # ==================== API 接口 ====================

    # /api/v1/messages 接口，支持重试机制
    location ~ ^/api/v1/messages {
        client_max_body_size 100m;
        content_by_lua_block {
            local retry_handler = require "handler.retry_handler"
            retry_handler.handle_with_retry("/api")
        }
    }

    # /apikey/v1/messages 接口，支持 API_KEY 认证和流式响应
    location ~ ^/apikey/v1/messages {
        client_max_body_size 100m;
        content_by_lua_block {
            local api_handler = require "handler.api_handler"
            api_handler.handle_api_key_request("/apikey")
        }
    }

    # 其他 API 接口，使用 proxy_pass（性能更好，不支持重试）
    location /api {
        client_max_body_size 100m;
        set $upstream_url "";

        access_by_lua_block {
            local body_reader = require "utils.body_reader"
            local keyword_filter = require "filter.keyword_filter"
            local dynamic_router = require "router.dynamic_router"

            local body = body_reader.read_body()

            if not keyword_filter.check(body) then
                keyword_filter.send_blocked_response()
                return ngx.exit(ngx.status)
            end

            local full_url = dynamic_router.route_by_auth_token("/api")
            if not full_url then
                return ngx.exit(401)
            end

            ngx.var.upstream_url = full_url
        }

        proxy_pass $upstream_url;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $proxy_host;

        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # OpenAI SDK 兼容接口，基路径为 /openai/v1，可直接代理 /openai/v1/models、/openai/v1/chat/completions、/openai/v1/responses
    location ^~ /openai/v1/ {
        client_max_body_size 100m;
        set $upstream_url "";

        access_by_lua_block {
            local body_reader = require "utils.body_reader"
            local keyword_filter = require "filter.keyword_filter"
            local dynamic_router = require "router.dynamic_router"

            local body = body_reader.read_body()

            if not keyword_filter.check(body) then
                keyword_filter.send_blocked_response()
                return ngx.exit(ngx.status)
            end

            local full_url = dynamic_router.route_by_auth_token("/openai/v1")
            if not full_url then
                return ngx.exit(401)
            end

            ngx.var.upstream_url = full_url
        }

        proxy_pass $upstream_url;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $proxy_host;
        proxy_buffering off;
        proxy_request_buffering off;

        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
        send_timeout 3600s;
    }

    # OpenAI/Codex 兼容接口，基路径为 /openai，Codex 实际会请求 /openai/responses
    location /openai {
        client_max_body_size 100m;
        set $upstream_url "";

        access_by_lua_block {
            local body_reader = require "utils.body_reader"
            local keyword_filter = require "filter.keyword_filter"
            local dynamic_router = require "router.dynamic_router"

            local body = body_reader.read_body()

            if not keyword_filter.check(body) then
                keyword_filter.send_blocked_response()
                return ngx.exit(ngx.status)
            end

            local full_url = dynamic_router.route_by_auth_token("/openai")
            if not full_url then
                return ngx.exit(401)
            end

            ngx.var.upstream_url = full_url
        }

        proxy_pass $upstream_url;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $proxy_host;
        proxy_buffering off;
        proxy_request_buffering off;

        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
        send_timeout 3600s;
    }

    # ==================== 关键词管理接口 ====================

    location = /keywords {
        content_by_lua_block {
            local keyword_manager = require "admin.keyword_manager"
            keyword_manager.handle()
        }
    }

    location = /regex-rules {
        content_by_lua_block {
            require("admin.regex_rule_manager").handle()
        }
    }

    # ==================== 路由管理接口 ====================

    location /route/list {
        content_by_lua_block {
            local route_manager = require "admin.route_manager"
            route_manager.list()
        }
    }

    location /route/add {
        content_by_lua_block {
            local route_manager = require "admin.route_manager"
            route_manager.add()
        }
    }

    location /route/del {
        content_by_lua_block {
            local route_manager = require "admin.route_manager"
            route_manager.delete()
        }
    }

    location /route/update {
        content_by_lua_block {
            local route_manager = require "admin.route_manager"
            route_manager.update()
        }
    }

    location /route/reload {
        content_by_lua_block {
            local route_manager = require "admin.route_manager"
            route_manager.reload()
        }
    }
}
